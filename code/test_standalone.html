<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景切换测试 - 独立版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimSun', serif; overflow: hidden; }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1s ease;
        }
        
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        
        .fade-in { opacity: 1 !important; }
        
        #content-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
        }
        
        #text-box {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 30px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(196, 30, 58, 0.5);
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 1.1em;
            line-height: 1.8;
        }
        
        #status-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 1.1em;
        }
        
        #bg-indicator {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.3em;
        }
        
        #scene-title {
            color: #c41e3a;
            font-size: 1.2em;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }
        
        #next-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
        }
        
        #auto-play-btn {
            display: block;
            margin: 10px auto;
            padding: 10px 30px;
            font-size: 0.9em;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border: 1px solid rgba(196, 30, 58, 0.6);
            border-radius: 6px;
            color: #e8e8e8;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #auto-play-btn:hover {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border-color: #c41e3a;
        }
        
        .image-preview {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 0.9em;
        }
        
        .image-preview img {
            width: 120px;
            height: 80px;
            border-radius: 4px;
            margin-top: 10px;
            border: 2px solid #c41e3a;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="background"></div>
        <div id="fade-overlay"></div>
        
        <div id="status-bar">
            当前背景图: <span id="bg-indicator">1/16</span>
        </div>
        
        <div class="image-preview">
            <div>当前背景预览:</div>
            <img id="preview-img" src="" alt="预览">
        </div>
        
        <div id="content-area">
            <div id="text-box">
                <div id="scene-title"></div>
                <div id="dialogue"></div>
            </div>
            <button id="next-btn" onclick="nextScene()">下一个场景 →</button>
            <button id="auto-play-btn" onclick="toggleAutoPlay()">自动播放 (3秒)</button>
        </div>
    </div>

    <script>
        // 使用免费图片服务来模拟16张背景图
        const backgrounds = [

        // 场景映射表 - 每个场景对应哪个背景图
        const sceneBackgroundMap = {
            'start': 0,

            'chapter1_2': 0,
            'chapter1_3': 0,
            'chapter1_4': 1,
            'node1_1': 1,

            'chapter2_5': 4,

            'node3_1': 4,

            'node3_3': 4,
            'transition3_1': 5,
            'chapter3_1': 5,

            'transition5_1': 9,
            'chapter4_1': 9,

            'transition6_1': 11,

            'transition9_1': 15,

            'node10_2': 15,
            'node10_3': 15
        };

        // 场景数据 - 模拟完整剧情流程
        const storyData = [
            { id: 'start', title: '序章：风雨欲来', dialogue: '1942年5月，华北日军集结数万兵力，对太行抗日根据地发动疯狂大"扫荡"。铁蹄踏遍山野，炮火撕裂晴空，根据地军民陷入空前险境。' },
            { id: 'chapter1_1', title: '第一章：雨夜急撤', dialogue: '冷雨斜斜地打在枝叶上，汇成水流顺着帽檐往下淌。脚下的黄泥路被雨水泡得软烂，踩上去噗嗤作响。队伍呈长蛇状在密林间蜿蜒前行，没人高声说话，唯有杂乱的脚步声和粗重的喘息声。' },
            { id: 'chapter1_2', title: '', dialogue: '左权翻身下马，徒步走了一段路。山路狭窄湿滑，马匹行进艰难，他不愿因坐骑拖累队伍速度。他抬手抹了把脸上的雨水，侧身叮嘱前排领队的战士："放慢步速，但绝对不能停。"' },
            { id: 'chapter1_3', title: '', dialogue: '我紧跟在他身后，目光下意识扫向队伍末尾。夜色浓重，林间能见度极低，大部分战士都埋着头赶路。就在这时，一阵压抑的痛呼隐隐传来，我循声望去，只见队伍最后方的新兵牛娃正扶着旁边的树干。' },
            { id: 'chapter1_4', title: '【抉择1】', dialogue: '他拼尽全力想要跟上大部队的节奏，可受伤的脚踝根本不听使唤。后方的枪炮声似乎又近了几分，隐约还能听见日军吆喝喊话的声音。你决定：[A]停下搀扶牛娃 [B]汇报首长 [C]催促跟上' },
            { id: 'node1_1', title: '抉择结果', dialogue: '你快步上前扶住牛娃，架着他的胳膊一步步前行。牛娃又惊又暖，反复道谢，心底对你充满感激。"谢谢哥...我...我能走..."他声音微弱，却带着真诚。' },
            { id: 'transition1_1', title: '', dialogue: '做出选择后，队伍继续在雨夜山林中穿行。雨势渐渐小了些，但山间寒风愈发刺骨，吹得人浑身发抖。左权始终走在队伍中段，时不时停下脚步，挨个询问伤员的身体状况。' },
            { id: 'transition1_2', title: '', dialogue: '约莫两个小时后，前方探路的侦查兵传来消息：前方山腰处有一处天然岩洞，空间开阔，能够容纳所有人临时躲避风雨。左权当即下令：全员加快脚步，前往岩洞休整。' },
            { id: 'chapter2_1', title: '第二章：岩洞暂歇', dialogue: '听到可以短暂休整，队伍里响起一阵低低的喘息声，所有人都绷紧的神经稍稍松弛。众人相互扶持着攀上陡坡，陆续走进了那座依山而建的天然岩洞。' },
            { id: 'chapter2_2', title: '', dialogue: '岩洞内侧的角落，几名重伤员躺在干草上，其中排长老周伤势最重。他在之前的阻击战中被子弹擦伤胸腹，此刻正发着高烧，脸颊通红，呼吸急促微弱。' },
            { id: 'chapter2_3', title: '', dialogue: '一路奔袭，所有人随身携带的干粮基本都已吃光。我伸手摸向胸口贴身存放的布包，里面还剩下最后一块拳头大小的杂粮干粮——这是我出发前特意留下的。' },
            { id: 'chapter2_4', title: '【抉择2】', dialogue: '老周的身体越来越虚弱，高烧让他意识都开始模糊，嘴唇干裂起皮，下意识地呢喃着水和食物。卫生员蹲在一旁，无奈地摇着头。你决定：[A]全部让出口粮 [B]分出一半 [C]自己保留' },
            { id: 'node2_1', title: '抉择结果', dialogue: '你将整块干粮掰碎，一点点喂到老周口中。"排长，吃点东西，有力气才能好起来。"洞内战士看在眼里，纷纷投来敬佩的目光。左权得知此事后，对你大加肯定。' },
            { id: 'transition2_1', title: '', dialogue: '口粮的事情尘埃落定，洞内的气氛恢复平和。大家利用这短暂的休整时间，整理装备、擦拭枪械，低声交流着接下来的突围路线。' },
            { id: 'chapter2_5', title: '第二章续：民心取舍', dialogue: '侦查班长快步冲了进来，神色凝重地汇报："首长，山下村落被日军搜查劫掠，还有不少老人、妇女和孩童被困在村内！距离岩洞不足一里地！"消息一出，洞内瞬间陷入一片沉寂。' },
            { id: 'chapter2_6', title: '【抉择3】', dialogue: '一边是被困的无辜百姓，一边是隐蔽休整的总部机关。若是贸然下山救人，极有可能暴露岩洞位置；可若是坐视不理，看着手无寸铁的百姓惨遭祸害，心里实在过意不去。你决定：[A]主动请命救人 [B]原地待命 [C]鸣枪引开日军' },
            { id: 'node3_1', title: '抉择结果', dialogue: '你主动请命："首长，让我带几个人下山！我们一定把村民安全转移出来！"愿意同行的战友纷纷响应。众人冒着风险下山，成功将村民转移至深山隐蔽处。' },
            { id: 'transition3_1', title: '', dialogue: '按照选择执行完毕后，山下的危机暂时解除。日军或是被枪声引走，或是搜查完毕撤离村落。左权见外界风险降低，当即下令全员整队出发，继续向十字岭深处行进。' },
            { id: 'chapter3_1', title: '第三章：情报危机', dialogue: '山间小路蜿蜒曲折，两侧林木茂密，怪石嶙峋。浓雾之中，每走一步都要格外小心。队伍行进了大约半个时辰，前方的尖兵突然停下脚步，抬手示意后方队伍暂缓前进。' },
            { id: 'chapter3_2', title: '', dialogue: '雾气当中，迎面走来一个衣衫褴褛、头发散乱的陌生人。此人身上满是泥土和划痕，脚步踉跄，神色慌张，看到我们这么一支队伍，顿时吓得往后缩了几步。' },
            { id: 'chapter3_3', title: '【抉择4】', dialogue: '"我是附近村子的逃难百姓！我知道前面山路的情况，日军在前面设了关卡！"此人言辞恳切，可眼下局势复杂，日军时常派出伪装成百姓的探子。你决定：[A]严格盘问 [B]直接放行 [C]交给首长甄别' },
            { id: 'node4_1', title: '抉择结果', dialogue: '你逐一盘问细节，对方破绽百出，被当场识破是伪装探子。"说！你们到底想干什么？"在你的逼问下，探子最终交代了日军的伏击计划。队伍及时改道，完美避开伏击点。' },
            { id: 'transition4_1', title: '', dialogue: '隐患清除，队伍重新整队前行。经过探子一事，所有人的警惕性提到了最高。又前行数百米，前方出现一处陡峭的山壁斜坡，防护绳索多处松动，固定木桩也有些摇晃。' },
            { id: 'chapter3_4', title: '第三章续：险坡危索', dialogue: '"首长，这段山路的防护绳索多处松动！现在队伍里还有伤员，若是直接通行，绳索很可能断裂，引发塌方、坠山危险！"身后的追兵随时可能追来，原地停留越久风险越高。' },
            { id: 'chapter3_5', title: '【抉择5】', dialogue: '几名伤员因为路途颠簸，脸色愈发苍白，根本没有余力应对突发危险。一边是步步紧逼的日军追兵，时间刻不容缓；一边是摇摇欲坠的防护绳索，全员通行危机四伏。你决定：[A]加固绳索 [B]快速通过 [C]全面排查' },
            { id: 'node5_1', title: '抉择结果', dialogue: '"大家停下！先加固绳索！"你带头动手，众人合力加固绳索与木桩。经过半个时辰的努力，路段彻底稳固。后续伤员、百姓通行全程安全，无任何意外。' },
            { id: 'transition5_1', title: '', dialogue: '险坡路段顺利通过，队伍终于抵达十字岭中段区域。此处地势开阔一些，林木相对稀疏，可也正因如此，我们彻底暴露在了日军的炮火射程之内。天际传来沉闷的轰鸣声。' },
            { id: 'chapter4_1', title: '第四章：炮火连天', dialogue: '炮火一轮接着一轮，日军主力部队已经追踪至此，大规模进攻正式打响。尖锐的枪声、炮声、喊杀声交织在一起，响彻整座太行山岭。短暂的炮火轰击过后，众人起身继续突围。' },
            { id: 'chapter4_2', title: '【抉择6】', dialogue: '队伍里的重伤员行动能力完全丧失，若是丢下伤员，于心不忍；若是带着全体伤员全速突围，行进速度会大幅减缓，很容易被敌军追上包围。你决定：[A]留下掩护伤员 [B]全员一起突围 [C]托付给农户' },
            { id: 'node6_1', title: '抉择结果', dialogue: '"我留下掩护伤员！""我也留下！"几名战士主动站了出来。小队就地隐蔽掩护伤员，暂时安全，但这部分人与主力队伍短暂失散。"保重！我们会回来接应你们的！"' },
            { id: 'transition6_1', title: '', dialogue: '伤员安置妥当，日军的攻势越发猛烈。层层包围圈不断收缩，突围的通道越来越狭窄。左权根据战局变化，迅速调整部署：组织精锐力量组成断后小队，留在后方阻拦追兵。' },
            { id: 'chapter4_3', title: '第四章续：勇担断后', dialogue: '"断后任务凶险，自愿报名即可，绝不强迫。"话音落下，现场一片安静。炮火还在耳边炸响，死亡的阴影近在咫尺。我跟随左权多年，心中早已做好共患难的准备。' },
            { id: 'node7_1', title: '【抉择7】', dialogue: '断后意味着直面敌军最凶猛的火力，是九死一生的任务。你决定：[A]主动请缨断后 [B]居中护卫首长 [C]申请先行转移' },
            { id: 'node7_2', title: '抉择结果', dialogue: '"首长，我留下断后！"你挺身而出，多名战友主动配合你留守断后。"好样的！大家一定要注意安全！"左权拍了拍你的肩膀。直面枪林弹雨的过程中，你内心生出强烈的使命感。' },
            { id: 'transition7_1', title: '', dialogue: '断后、护卫、先行的人员各自就位，整支队伍向着十字岭最高处挺进。这里是整片山岭的制高点，也是最后的突围关口。日军集结全部兵力发起总攻，包围圈彻底合拢。' },
            { id: 'chapter5_1', title: '第五章：生死绝境', dialogue: '危急关头，左权做出了最决绝的决定。他拒绝跟随主力队伍先行突围，执意留在高地指挥全局，亲自坐镇断后，为所有人撕开一条生路。"大家不要慌乱，沿着东侧山道全力突围！"' },
            { id: 'chapter5_2', title: '【抉择8】', dialogue: '我作为贴身警卫员，陪在他身边，看着这位平日里温和仁厚的将领，此刻目光如炬，将生死置之度外。你决定：[A]含泪劝说首长撤离 [B]誓死陪伴左右 [C]护送他人先行' },
            { id: 'node8_1', title: '抉择结果', dialogue: '"首长！您快走吧！这里太危险了！"你含泪极力劝说。左权温柔婉拒："怀安，我是这里的最高指挥官，我不能走。你们都走，我来断后。记住，一定要把同志们都安全送出去。"' },
            { id: 'transition8_1', title: '', dialogue: '选择落地之后，战局依旧在疯狂推进。主力队伍的突围越来越顺利，大部分人员已经成功冲出日军封锁。而高地之上，只剩下寥寥数人，依旧在顽强阻击敌军。' },
            { id: 'chapter5_3', title: '第五章续：刹那生死', dialogue: '就在这时，一枚炮弹划破浓烟，精准地朝着指挥高地的位置飞速袭来！距离极近，速度极快，所有人都来不及做出完整的思考，生死只在一瞬间。' },
            { id: 'node9_1', title: '【抉择9】', dialogue: '炮弹近在咫尺，轰鸣之声震耳欲聋，危险已然降临。你决定：[A]纵身扑上前掩护首长 [B]大声嘶吼警报 [C]本能俯身躲避' },
            { id: 'node9_2', title: '抉择结果', dialogue: '你不顾一切纵身扑上前，试图掩护首长。"首长！小心！"巨大的冲击波将你震飞，你被炮弹冲击波震成重伤，近距离目睹悲剧发生，极致的悲痛萦绕全身。' },
            { id: 'transition9_1', title: '【将星陨落】', dialogue: '硝烟缓缓散去，残酷的结果已然出现。左权副总参谋长不幸中弹，壮烈牺牲在十字岭高地之上。历史的轨迹在此定格，这位爱兵如子、心怀家国的优秀将领，将生命永远留在了太行残雪之间。' },
            { id: 'chapter_end', title: '终章：残雪太行', dialogue: '远方传来主力队伍的集结信号，最后的突围机会就在眼前。擦干眼泪，收起悲痛，所有人都要继续前行。经历了整场血战，经历了将星陨落的悲剧，此刻每个人的心境都截然不同。' },

            { id: 'node10_2', title: '结局：青山永念', dialogue: '"同志们！为了首长！为了胜利！冲啊！"你强忍悲痛，带头鼓舞战友士气，全力冲锋突围。战士们在你的激励下，纷纷站起身来，高喊着冲向最后的防线。（达成完美结局）' }
        ];

        let currentBackground = 0;
        let currentSceneIndex = 0;
        let autoPlayInterval = null;
        let isAutoPlaying = false;

        function nextScene() {
            if (currentSceneIndex >= storyData.length) {
                currentSceneIndex = 0;
            }
            
            const scene = storyData[currentSceneIndex];
            const newBackgroundIndex = sceneBackgroundMap[scene.id] !== undefined ? sceneBackgroundMap[scene.id] : currentBackground;
            
            updateBackground(newBackgroundIndex);
            updateSceneInfo(scene);
            updateStatus(currentSceneIndex + 1);
            
            currentSceneIndex++;
        }

        function updateBackground(index) {
            if (index !== currentBackground) {
                currentBackground = index;
                fadeToBackground(index);
            }
        }

        function fadeToBackground(index) {
            const overlay = document.getElementById('fade-overlay');
            const bgElement = document.getElementById('background');
            const previewImg = document.getElementById('preview-img');
            
            overlay.classList.add('fade-in');
            
            setTimeout(() => {
                const bgUrl = backgrounds[index];
                bgElement.style.backgroundImage = `url(${bgUrl})`;
                previewImg.src = bgUrl;
                overlay.classList.remove('fade-in');
            }, 400);
        }

        function updateSceneInfo(scene) {
            document.getElementById('scene-title').textContent = scene.title || '';
            document.getElementById('dialogue').textContent = scene.dialogue;
        }

        function updateStatus(sceneNum) {
            document.getElementById('bg-indicator').textContent = `${sceneNum}/${storyData.length}`;
        }

        function toggleAutoPlay() {
            const btn = document.getElementById('auto-play-btn');
            
            if (isAutoPlaying) {
                clearInterval(autoPlayInterval);
                btn.textContent = '自动播放 (3秒)';
            } else {
                autoPlayInterval = setInterval(nextScene, 3000);
                btn.textContent = '停止自动播放';
            }
            
            isAutoPlaying = !isAutoPlaying;
        }

        // 初始化第一个场景
        window.onload = function() {
            const firstScene = storyData[0];
            const firstBgIndex = sceneBackgroundMap[firstScene.id] || 0;
            
            document.getElementById('background').style.backgroundImage = `url(${backgrounds[firstBgIndex]})`;
            document.getElementById('preview-img').src = backgrounds[firstBgIndex];
            updateSceneInfo(firstScene);
            updateStatus(1);
        };
    </script>
</body>
