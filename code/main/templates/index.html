<!DOCTYPE html>
<html>
<head>
    <title>游戏测试</title>
    <style>
        body { margin: 0; padding: 20px; background: #333; color: white; font-family: Arial; }
        .image-container { max-width: 800px; margin: 0 auto; }
        img { max-width: 100%; height: auto; border: 2px solid #666; margin-bottom: 10px; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
        .nav-buttons { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>📷 图片测试页面</h1>
    <p>当前图片: <span id="current-image">1</span>/17</p>
    
    <div class="nav-buttons">
        <button onclick="prevImage()">上一张</button>
        <button onclick="nextImage()">下一张</button>
        <button onclick="showRandom()">随机</button>
    </div>
    
    <div class="image-container">
        <img id="main-image" src="/static/image/1.jpg?cache_buster=20260527" alt="图片1">
    </div>
    
    <div style="margin-top: 20px;">
        <p>点击按钮查看所有17张图片：</p>
        <div id="thumbnails"></div>
    </div>
    
    <script>
        let currentIndex = 0;
        const totalImages = 17;
        const cacheBuster = '?v=20260527_new';
        
        function updateImage(index) {
            if (index < 0) index = totalImages - 1;
            if (index >= totalImages) index = 0;
            currentIndex = index;
            
            const img = document.getElementById('main-image');
            img.src = `/static/image/${index + 1}.jpg${cacheBuster}`;
            document.getElementById('current-image').textContent = index + 1;
        }
        
        function prevImage() {
            updateImage(currentIndex - 1);
        }
        
        function nextImage() {
            updateImage(currentIndex + 1);
        }
        
        function showRandom() {
            const randomIndex = Math.floor(Math.random() * totalImages);
            updateImage(randomIndex);
        }
        
        function initThumbnails() {
            const container = document.getElementById('thumbnails');
            for (let i = 1; i <= totalImages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.onclick = () => updateImage(i - 1);
                btn.style.width = '36px';
                btn.style.height = '36px';
                container.appendChild(btn);
            }
        }
        
        initThumbnails();
    </script>
</body>
</html>
