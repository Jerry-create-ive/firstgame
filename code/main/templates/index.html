<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血色征程 - 太行突围</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'SimHei', sans-serif; overflow: hidden; }
        
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1s ease;
        }
        
        #fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        #fade-overlay.fade-in { opacity: 1; }
        
        #bg-error {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(196, 30, 58, 0.9);
            color: white;
            border-radius: 5px;
            font-size: 14px;
            z-index: 50;
            display: none;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
        }
        
        #start-screen h1 {
            color: #c41e3a;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
        }
        
        #start-screen p {
            color: #e8e8e8;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        #start-btn {
            padding: 15px 50px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.8);
        }
        
        #game-container {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .status-item {
            color: #e8e8e8;
            font-size: 14px;
        }
        
        .status-item span {
            color: #ffd700;
            font-weight: bold;
        }
        
        #progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin: 0 20px;
            overflow: hidden;
        }
        
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a, #ffd700);
            transition: width 0.5s ease;
        }
        
        #chapter-title {
            text-align: center;
            color: #c41e3a;
            font-size: 1.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        #dialogue-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 15px;
            padding: 30px;
            color: #e8e8e8;
            font-size: 1.1em;
            line-height: 1.8;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(196, 30, 58, 0.3);
        }
        
        #narrator {
            color: #ffd700;
            font-style: italic;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        #dialogue {
            min-height: 100px;
        }
        
        .character-name {
            color: #4CAF50;
            font-weight: bold;
        }
        
        #choices-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        
        .choice-btn {
            padding: 15px 30px;
            background: rgba(45, 45, 68, 0.8);
            border: 1px solid rgba(196, 30, 58, 0.5);
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .choice-btn:hover {
            background: rgba(196, 30, 58, 0.8);
            border-color: #c41e3a;
            transform: translateX(10px);
        }
        
        #end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
        }
        
        #end-screen h2 {
            color: #c41e3a;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        #end-screen p {
            color: #e8e8e8;
            font-size: 1.2em;
            text-align: center;
            max-width: 600px;
            margin-bottom: 30px;
        }
        
        #restart-btn {
            padding: 15px 50px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.8);
        }
        
        #footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8em;
            margin-top: 10px;
        }
    </style>
</head>

            chapter5_1: { chapter: '第五章：生死绝境', narrator: '[最后的抉择]', dialogue: '左权拒绝先行突围，执意留在高地指挥，亲自断后。', next: 'chapter5_2' },
            chapter5_2: { chapter: '', narrator: '[抉择8]', dialogue: '你决定：', choices: [
                { text: '[A] 劝说首长撤离', next: 'node8_1', affection: 1 },
                { text: '[B] 誓死陪伴左右', next: 'node8_2', affection: 1 },
                { text: '[C] 护送他人先行', next: 'node8_3', affection: 0 }
            ], node: 8 },
            node8_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你含泪劝说，左权温柔婉拒："我是指挥官，不能走。"', next: 'transition8_1' },
            node8_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你默默持枪站立，陪首长走完最后一段路。', next: 'transition8_1' },
            node8_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你奉命先行，回望高地，内心焦急万分。', next: 'transition8_1' },
            transition8_1: { chapter: '', narrator: '[炮弹袭来]', dialogue: '一枚炮弹向着指挥高地飞速袭来，生死只在一瞬间。', next: 'chapter5_3' },
            chapter5_3: { chapter: '第五章续：刹那生死', narrator: '[抉择9]', dialogue: '你决定：', choices: [
                { text: '[A] 扑上前掩护', next: 'node9_1', affection: 1 },
                { text: '[B] 大声嘶吼警报', next: 'node9_2', affection: 0 },
                { text: '[C] 本能躲避', next: 'node9_3', affection: -1 }
            ], node: 9 },
            node9_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你扑上前试图掩护，冲击波将你震飞，目睹悲剧发生。', next: 'transition9_1' },
            node9_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你大声警报，周边战士及时避险，却无力挽回结局。', next: 'transition9_1' },
            node9_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你本能躲避，眼睁睁看着惨剧发生，巨大遗憾填满心房。', next: 'transition9_1' },
            transition9_1: { chapter: '', narrator: '[将星陨落]', dialogue: '硝烟散去，左权副总参谋长壮烈牺牲，将生命留在太行。', next: 'chapter_end' },
            chapter_end: { chapter: '终章：残雪太行', narrator: '[最终抉择]', dialogue: '主力队伍突围成功，最后的机会就在眼前。', choices: [
                { text: '[A] 带头鼓舞士气冲锋', next: 'node10_1', affection: 1 },
                { text: '[B] 肃穆送别将军', next: 'node10_2', affection: 0 },
                { text: '[C] 沉默跟随队伍', next: 'node10_3', affection: -1 }
            ], node: 10 },
            node10_1: { chapter: '', narrator: '[结局]', dialogue: '"同志们！为了首长！冲啊！"你带头冲锋，战士们高喊着冲向防线。', ending: 'good' },
            node10_2: { chapter: '', narrator: '[结局]', dialogue: '你肃穆低头送别将军，泪水无声滑落，心中满是敬意。', ending: 'neutral' },
            node10_3: { chapter: '', narrator: '[结局]', dialogue: '你沉默跟随队伍，没有呐喊，只有心底无尽的悲凉。', ending: 'bad' }
        };
        
        let currentScene = 'start';
        let currentBackground = 0;
        let affection = 0;
        let visitedNodes = [];
        let isTyping = false;
        let typingIndex = 0;
        let currentDialogue = '';
        
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            currentScene = 'start';
            affection = 0;
            visitedNodes = [];
            updateStatus();
            fadeToBackground(0);
            loadScene();
        }
        
        function restartGame() {
            document.getElementById('end-screen').style.display = 'none';
            startGame();
        }
        
        function loadScene() {
            const scene = storyData[currentScene];
            if (!scene) {
                console.error('场景不存在:', currentScene);
                document.getElementById('dialogue').innerHTML = '<span style="color: red;">错误：场景加载失败</span>';
                return;
            }
            
            document.getElementById('choices-container').innerHTML = '';
            
            document.getElementById('chapter-title').textContent = scene.chapter || '';
            document.getElementById('narrator').textContent = scene.narrator || '';
            
            if (scene.choices) {
                if (!visitedNodes.includes(scene.node)) {
                    visitedNodes.push(scene.node);
                }
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                showChoices(scene.choices);
            } else if (scene.ending) {
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                setTimeout(() => showEnding(scene.ending), 2000);
            } else {
                currentDialogue = scene.dialogue;
                typeDialogue();
            }
        }
        
        function typeDialogue() {
            if (isTyping) return;
            isTyping = true;
            typingIndex = 0;
            document.getElementById('dialogue').innerHTML = '';
            
            const typeInterval = setInterval(() => {
                if (typingIndex < currentDialogue.length) {
                    let char = currentDialogue[typingIndex];
                    if (char === '<') {
                        let tagEnd = currentDialogue.indexOf('>', typingIndex);
                        if (tagEnd !== -1) {
                            document.getElementById('dialogue').innerHTML += currentDialogue.substring(typingIndex, tagEnd + 1);
                            typingIndex = tagEnd + 1;
                            return;
                        }
                    }
                    document.getElementById('dialogue').innerHTML += char;
                    typingIndex++;
                } else {
                    clearInterval(typeInterval);
                    isTyping = false;
                    if (storyData[currentScene].next) {
                        console.log('场景切换:', currentScene, '->', storyData[currentScene].next);
                        setTimeout(() => {
                            currentScene = storyData[currentScene].next;
                            updateBackground();
                            loadScene();
                        }, 1500);
                    }
                }
            }, 30);
        }
        
        function skipTyping() {
            if (isTyping) {
                document.getElementById('dialogue').innerHTML = currentDialogue;
                isTyping = false;
                typingIndex = currentDialogue.length;
                if (storyData[currentScene].next) {
                    setTimeout(() => {
                        currentScene = storyData[currentScene].next;
                        updateBackground();
                        loadScene();
                    }, 500);
                }
            }
        }
        
        function showChoices(choices) {
            const container = document.getElementById('choices-container');
            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = choice.text;
                btn.onclick = () => makeChoice(choice);
                container.appendChild(btn);
            });
        }
        
        function makeChoice(choice) {
            affection += choice.affection;
            console.log('选择:', choice.text, '->', choice.next, '好感度:', affection);
            currentScene = choice.next;
            updateStatus();
            updateBackground();
            loadScene();
        }
        
        function updateStatus() {
            document.getElementById('node-count').textContent = `${visitedNodes.length}/10`;
            
            let affectionText = affection >= 5 ? '高尚' : affection >= 3 ? '正直' : affection >= 1 ? '善良' : affection >= -1 ? '中立' : affection >= -3 ? '自私' : '冷漠';
            document.getElementById('affection').textContent = affectionText;
            
            let endingType = affection >= 5 ? '青山永念' : affection >= 0 ? '山河怅惘' : '半生愧悔';
            document.getElementById('ending-type').textContent = endingType;
            
            document.getElementById('progress-fill').style.width = `${(visitedNodes.length / 10) * 100}%`;
        }
        
        function updateBackground() {
            const newBackgroundIndex = sceneBackgroundMap[currentScene] !== undefined ? sceneBackgroundMap[currentScene] : currentBackground;
            if (newBackgroundIndex !== currentBackground) {
                currentBackground = newBackgroundIndex;
                fadeToBackground(currentBackground);
            }
        }
        
        function fadeToBackground(index) {
            const overlay = document.getElementById('fade-overlay');
            const bgElement = document.getElementById('background');
            const errorElement = document.getElementById('bg-error');
            
            overlay.classList.add('fade-in');
            
            setTimeout(() => {
                const img = new Image();
                const cacheBuster = '?v=' + new Date().getTime();
                const imageUrl = backgrounds[index] + cacheBuster;
                
                img.onload = function() {
                    bgElement.style.backgroundImage = `url(${imageUrl})`;
                    errorElement.style.display = 'none';
                    overlay.classList.remove('fade-in');
                };
                img.onerror = function() {
                    bgElement.style.backgroundImage = `linear-gradient(135deg, #1a1a2e, #16213e)`;
                    errorElement.textContent = '警告：无法加载背景图 ' + backgrounds[index];
                    errorElement.style.display = 'block';
                    overlay.classList.remove('fade-in');
                };
                img.src = imageUrl;
            }, 400);
        }
        
        function showEnding(type) {
            const endScreen = document.getElementById('end-screen');
            const title = document.getElementById('ending-title');
            const text = document.getElementById('ending-text');
            
            switch(type) {
                case 'good':
                    title.textContent = '青山永念';
                    text.textContent = '你带着战友们冲出了重围，左权将军的精神永远激励着你。多年后，每当你想起那个血色黄昏，心中依然热血沸腾。太行山上的每一寸土地，都铭记着那段不屈的岁月。';
                    break;
                case 'neutral':
                    title.textContent = '山河怅惘';
                    text.textContent = '战争结束了，但那段记忆永远刻在你心中。你时常会想起那个雨夜的行军，想起牺牲的战友，想起将军最后的身影。和平来之不易，你会用余生守护这份安宁。';
                    break;
                case 'bad':
                    title.textContent = '半生愧悔';
                    text.textContent = '你活了下来，但内心的愧疚从未消散。战场上的选择时常在梦中重现，那些未能挽救的生命，成为你永远的遗憾。唯有继续前行，才能告慰英灵。';
                    break;
            }
            
            endScreen.style.display = 'flex';
        }
    </script>
