{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太行残雪 - 视觉小说</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimSun', 'STSong', serif; background: #1a1a2e; color: #e8e8e8; overflow: hidden; }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.9;
            transition: opacity 1s ease;
        }
        
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        
        .fade-in { opacity: 1 !important; }
        
        #content-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.8), rgba(0,0,0,0));
            padding: 30px;
            overflow-y: auto;
        }
        
        #text-box {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 30px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(196, 30, 58, 0.5);
            border-radius: 8px;
        }
        
        #chapter-title { color: #c41e3a; font-size: 1.2em; font-weight: bold; margin-bottom: 15px; text-align: center; letter-spacing: 4px; }
        #narrator { color: #ffd700; font-size: 0.9em; margin-bottom: 10px; font-style: italic; }
        #dialogue { font-size: 1.1em; line-height: 1.8; color: #e8e8e8; text-indent: 2em; margin-bottom: 20px; }
        
        #choices-container {
            max-width: 800px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .choice-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border: 1px solid rgba(196, 30, 58, 0.6);
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .choice-btn:hover {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border-color: #c41e3a;
            transform: translateX(10px);
        }
        
        #status-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(196, 30, 58, 0.3);
            font-size: 0.9em;
        }
        
        #status-bar div { margin: 5px 0; color: #e8e8e8; }
        #status-bar .label { color: #c41e3a; font-weight: bold; }
        
        #progress-bar { width: 100%; height: 3px; background: #2d2d44; border-radius: 2px; margin-top: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, #c41e3a, #ffd700); transition: width 0.5s ease; }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        #start-title { font-size: 3.5em; color: #c41e3a; text-shadow: 0 0 30px rgba(196, 30, 58, 0.5); margin-bottom: 20px; letter-spacing: 10px; }
        #start-subtitle { font-size: 1.2em; color: #e8e8e8; margin-bottom: 50px; letter-spacing: 5px; }
        
        #start-btn {
            padding: 15px 50px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }
        
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(196, 30, 58, 0.6); }
        
        #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 30px;
        }
        
        #end-title { font-size: 2.5em; color: #c41e3a; margin-bottom: 30px; text-align: center; }
        #end-content { max-width: 800px; font-size: 1.1em; line-height: 2; color: #e8e8e8; text-align: center; margin-bottom: 40px; }
        
        #restart-btn {
            padding: 15px 50px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border: 1px solid rgba(196, 30, 58, 0.6);
            border-radius: 6px;
            color: #e8e8e8;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #restart-btn:hover { background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%); border-color: #c41e3a; }
        
        #bg-error {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(196, 30, 58, 0.9);
            padding: 10px 20px;
            border-radius: 4px;
            color: #fff;
            font-size: 0.9em;
            z-index: 100;
            display: none;
        }
        
        .center-text { text-align: center; text-indent: 0 !important; }
        .highlight { color: #ffd700; font-weight: bold; }
        .character-name { color: #c41e3a; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="background"></div>
        <div id="fade-overlay"></div>
        <div id="bg-error"></div>
        
        <div id="start-screen">
            <h1 id="start-title">太行残雪</h1>
            <p id="start-subtitle">—— 1942年十字岭反扫荡纪实</p>
            <button id="start-btn" onclick="startGame()">开始游戏</button>
        </div>

        <div id="status-bar">
            <div><span class="label">节点:</span> <span id="node-count">0/10</span></div>
            <div><span class="label">结局:</span> <span id="ending-type">未定</span></div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div id="content-area">
            <div id="text-box">
                <div id="chapter-title"></div>
                <div id="narrator"></div>
                <div id="dialogue"></div>
            </div>
            <div id="choices-container"></div>
        </div>

        <div id="end-screen" style="display: none;">
            <h1 id="end-title"></h1>
            <div id="end-content"></div>
            <button id="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const backgrounds = [
            '{% static "image/1.jpg" %}',
            '{% static "image/2.jpg" %}',
            '{% static "image/3.jpg" %}',
            '{% static "image/4.jpg" %}',
            '{% static "image/5.jpg" %}',
            '{% static "image/6.jpg" %}',
            '{% static "image/7.jpg" %}',
            '{% static "image/8.jpg" %}',
            '{% static "image/9.jpg" %}',
            '{% static "image/10.jpg" %}',
            '{% static "image/11.jpg" %}',
            '{% static "image/12.jpg" %}',
            '{% static "image/13.jpg" %}',
            '{% static "image/14.jpg" %}',
            '{% static "image/15.jpg" %}',
            '{% static "image/16.jpg" %}',
            '{% static "image/17.jpg" %}'
        ];

        const sceneBackgroundMap = {
            'start': 0, 'chapter1_1': 0, 'chapter1_2': 0, 'chapter1_3': 0,
            'chapter1_4': 0, 'node1_1': 0, 'node1_2': 0, 'node1_3': 0,
            'transition1_1': 0, 'transition1_2': 1, 'chapter2_1': 1, 'chapter2_2': 1,
            'chapter2_3': 4, 'chapter2_4': 3, 'node2_1': 3, 'node2_2': 3,
            'node2_3': 3, 'transition2_1': 1, 'chapter2_5': 2, 'chapter2_6': 2,
            'node3_1': 2, 'node3_2': 2, 'node3_3': 2, 'transition3_1': 2,
            'chapter3_1': 5, 'chapter3_2': 5, 'chapter3_3': 5, 'node4_1': 5,
            'node4_2': 5, 'node4_3': 5, 'transition4_1': 5, 'chapter3_4': 6,
            'chapter3_5': 6, 'node5_1': 6, 'node5_2': 6, 'node5_3': 6,
            'transition5_1': 7, 'chapter4_1': 7, 'chapter4_2': 7, 'node6_1': 7,
            'node6_2': 7, 'node6_3': 7, 'transition6_1': 8, 'chapter4_3': 8,
            'node7_1': 8, 'node7_2': 8, 'node7_3': 8, 'transition7_1': 8,
            'chapter5_1': 12, 'chapter5_2': 10, 'node8_1': 10, 'node8_2': 10,
            'node8_3': 10, 'transition8_1': 10, 'chapter5_3': 9, 'node9_1': 9,
            'node9_2': 9, 'node9_3': 9, 'transition9_1': 9, 'chapter_end': 13,
            'node10_1': 13, 'node10_2': 13, 'node10_3': 13
        };

        const storyData = {
            start: { chapter: '', narrator: '', dialogue: '1942年5月，华北日军集结数万兵力，对太行抗日根据地发动疯狂大"扫荡"。铁蹄踏遍山野，炮火撕裂晴空，根据地军民陷入空前险境。八路军总部机关被迫连夜转移，向着山势险峻、易守难攻的十字岭深山突围。', next: 'chapter1_1' },
            chapter1_1: { chapter: '第一章：雨夜急撤', narrator: '[雨夜山林]', dialogue: '冷雨斜斜地打在枝叶上，汇成水流顺着帽檐往下淌。脚下的黄泥路被雨水泡得软烂，踩上去噗嗤作响。', next: 'chapter1_2' },
            chapter1_2: { chapter: '', narrator: '[跟随首长]', dialogue: '<span class="character-name">左权</span>翻身下马，徒步走了一段路。山路狭窄湿滑，马匹行进艰难。', next: 'chapter1_3' },
            chapter1_3: { chapter: '', narrator: '[发现异常]', dialogue: '我紧跟在他身后，只见队伍最后方的新兵牛娃正扶着树干，脚腕明显肿胀。', next: 'chapter1_4' },
            chapter1_4: { chapter: '', narrator: '[抉择1]', dialogue: '牛娃拼尽全力想要跟上，可受伤的脚踝根本不听使唤。你决定：', choices: [
                { text: '[A] 停下搀扶牛娃', next: 'node1_1', spirit: 2 },
                { text: '[B] 汇报首长请求派人接应', next: 'node1_2', spirit: 1 },
                { text: '[C] 催促跟上', next: 'node1_3', spirit: -1 }
            ], node: 1 },
            node1_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你快步上前扶住牛娃，架着他的胳膊一步步前行。牛娃又惊又暖，反复道谢。', next: 'transition1_1' },
            node1_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你跑到左权身边说明情况，首长赞许你思虑周全。', next: 'transition1_1' },
            node1_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你催促牛娃："快点跟上！"他面露难堪，强忍着剧痛赶路。', next: 'transition1_1' },
            transition1_1: { chapter: '', narrator: '[雨夜行军]', dialogue: '队伍继续穿行，左权时不时停下询问伤员状况，将干粮分给年轻战士。', next: 'transition1_2' },
            transition1_2: { chapter: '', narrator: '[发现岩洞]', dialogue: '侦查兵传来消息：前方山腰有一处天然岩洞，可以临时休整。', next: 'chapter2_1' },
            chapter2_1: { chapter: '第二章：岩洞暂歇', narrator: '[进入岩洞]', dialogue: '众人走进岩洞，总算能避开风雨。战士们纷纷坐下，揉着酸痛的腿脚。', next: 'chapter2_2' },
            chapter2_2: { chapter: '', narrator: '[重伤排长]', dialogue: '岩洞角落，排长老周伤势最重，发着高烧，呼吸急促微弱。', next: 'chapter2_3' },
            chapter2_3: { chapter: '', narrator: '[最后的口粮]', dialogue: '一路奔袭，干粮基本吃光。我怀里还藏着最后一块杂粮干粮。', next: 'chapter2_4' },
            chapter2_4: { chapter: '', narrator: '[抉择2]', dialogue: '老周嘴唇干裂，呢喃着食物。卫生员无奈摇头。你决定：', choices: [
                { text: '[A] 全部让出口粮', next: 'node2_1', spirit: 3 },
                { text: '[B] 分出一半', next: 'node2_2', spirit: 1 },
                { text: '[C] 自己保留', next: 'node2_3', spirit: -2 }
            ], node: 2 },
            node2_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你将干粮掰碎喂给老周，战士们投来敬佩的目光。左权对你大加肯定。', next: 'transition2_1' },
            node2_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你平分口粮，处事稳妥，没有额外好感也没有不满。', next: 'transition2_1' },
            node2_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你悄悄收好干粮，身旁战士看在眼里，神色冷淡。', next: 'transition2_1' },
            transition2_1: { chapter: '', narrator: '[紧急情报]', dialogue: '侦查班长冲进来："山下村落被日军搜查，有百姓被困！"', next: 'chapter2_5' },
            chapter2_5: { chapter: '第二章续：民心取舍', narrator: '[百姓遇险]', dialogue: '一边是被困百姓，一边是隐蔽休整的总部机关。贸然下山可能暴露位置。', next: 'chapter2_6' },
            chapter2_6: { chapter: '', narrator: '[抉择3]', dialogue: '你决定：', choices: [
                { text: '[A] 主动请命救人', next: 'node3_1', spirit: 3 },
                { text: '[B] 原地待命', next: 'node3_2', spirit: 0 },
                { text: '[C] 鸣枪引开日军', next: 'node3_3', spirit: 2 }
            ], node: 3 },
            node3_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你主动请命："让我带几个人下山！"成功转移村民，大娘握着你的手感激不已。', next: 'transition3_1' },
            node3_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你服从命令原地待命，村民自行躲避，心中留下遗憾。', next: 'transition3_1' },
            node3_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你的提议被采纳，战士们鸣枪引开日军，队伍安全避险。', next: 'transition3_1' },
            transition3_1: { chapter: '', narrator: '[继续前行]', dialogue: '危机解除，队伍继续向十字岭深处行进，山间起了浓雾。', next: 'chapter3_1' },
            chapter3_1: { chapter: '第三章：情报危机', narrator: '[遭遇陌生人]', dialogue: '浓雾中走来一个衣衫褴褛的陌生人，自称是逃难百姓。', next: 'chapter3_2' },
            chapter3_2: { chapter: '', narrator: '[可疑之人]', dialogue: '此人言辞恳切，可眼下局势复杂，日军时常派探子伪装。', next: 'chapter3_3' },
            chapter3_3: { chapter: '', narrator: '[抉择4]', dialogue: '你决定：', choices: [
                { text: '[A] 严格盘问', next: 'node4_1', spirit: 2 },
                { text: '[B] 直接放行', next: 'node4_2', spirit: -3 },
                { text: '[C] 交给首长甄别', next: 'node4_3', spirit: 1 }
            ], node: 4 },
            node4_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你盘问细节，对方破绽百出，被识破是日军探子。队伍及时改道避开伏击。', next: 'transition4_1' },
            node4_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你放行了陌生人，此人传递假情报，队伍误入伏击圈。', next: 'transition4_1' },
            node4_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你将人送至首长面前，左权精准甄别，排除隐患。', next: 'transition4_1' },
            transition4_1: { chapter: '', narrator: '[险坡危索]', dialogue: '前方出现陡峭山壁，防护绳索多处松动，通行危险。', next: 'chapter3_4' },
            chapter3_4: { chapter: '第三章续：险坡危索', narrator: '[绳索松动]', dialogue: '伤员根本无力应对突发危险，原地停留越久风险越高。', next: 'chapter3_5' },
            chapter3_5: { chapter: '', narrator: '[抉择5]', dialogue: '你决定：', choices: [
                { text: '[A] 加固绳索', next: 'node5_1', spirit: 2 },
                { text: '[B] 快速通过', next: 'node5_2', spirit: 0 },
                { text: '[C] 全面排查', next: 'node5_3', spirit: 2 }
            ], node: 5 },
            node5_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你带头加固绳索，经过努力路段稳固，伤员安全通过。', next: 'transition5_1' },
            node5_2: { chapter: '', narrator: '[抉择结果]', dialogue: '队伍快速通行，最后一名战士打滑险些坠落，有惊无险。', next: 'transition5_1' },
            node5_3: { chapter: '', narrator: '[抉择结果]', dialogue: '全员排查路况，清理碎石，彻底规避风险。', next: 'transition5_1' },
            transition5_1: { chapter: '', narrator: '[炮火来袭]', dialogue: '抵达开阔区域，日军炮火开始轰击，大规模进攻打响。', next: 'chapter4_1' },
            chapter4_1: { chapter: '第四章：炮火连天', narrator: '[伤员难题]', dialogue: '重伤员行动能力丧失，带着伤员突围速度会大幅减缓。', next: 'chapter4_2' },
            chapter4_2: { chapter: '', narrator: '[抉择6]', dialogue: '你决定：', choices: [
                { text: '[A] 留下掩护伤员', next: 'node6_1', spirit: 3 },
                { text: '[B] 全员一起突围', next: 'node6_2', spirit: 2 },
                { text: '[C] 托付给农户', next: 'node6_3', spirit: 1 }
            ], node: 6 },
            node6_1: { chapter: '', narrator: '[抉择结果]', dialogue: '几名战士主动留下掩护，与主力队伍短暂失散。', next: 'transition6_1' },
            node6_2: { chapter: '', narrator: '[抉择结果]', dialogue: '全员相互搀扶，队伍凝聚力达到顶峰，同心协力冲锋。', next: 'transition6_1' },
            node6_3: { chapter: '', narrator: '[抉择结果]', dialogue: '伤员被农户妥善收留，队伍轻装前行，突围速度提升。', next: 'transition6_1' },
            transition6_1: { chapter: '', narrator: '[断后任务]', dialogue: '包围圈收缩，左权组织精锐力量断后，掩护大部队突围。', next: 'chapter4_3' },
            chapter4_3: { chapter: '第四章续：勇担断后', narrator: '[主动请战]', dialogue: '断后意味着直面敌军火力，是九死一生的任务。', choices: [
                { text: '[A] 主动请缨断后', next: 'node7_1', spirit: 4 },
                { text: '[B] 居中护卫首长', next: 'node7_2', spirit: 1 },
                { text: '[C] 申请先行转移', next: 'node7_3', spirit: -3 }
            ], node: 7 },
            node7_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你挺身而出，多名战友配合留守，内心生出强烈使命感。', next: 'transition7_1' },
            node7_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你恪守本分，坚守护卫岗位，安稳完成本职工作。', next: 'transition7_1' },
            node7_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你选择先行撤离，离开时满心愧疚，面对首长局促不安。', next: 'transition7_1' },
            transition7_1: { chapter: '', narrator: '[生死绝境]', dialogue: '日军发起总攻，包围圈合拢，突围通道被封锁。', next: 'chapter5_1' },
            chapter5_1: { chapter: '第五章：生死绝境', narrator: '[最后的抉择]', dialogue: '左权拒绝先行突围，执意留在高地指挥，亲自断后。', next: 'chapter5_2' },
            chapter5_2: { chapter: '', narrator: '[抉择8]', dialogue: '你决定：', choices: [
                { text: '[A] 劝说首长撤离', next: 'node8_1', spirit: 3 },
                { text: '[B] 誓死陪伴左右', next: 'node8_2', spirit: 4 },
                { text: '[C] 护送他人先行', next: 'node8_3', spirit: 1 }
            ], node: 8 },
            node8_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你含泪劝说，左权温柔婉拒："我是指挥官，不能走。"', next: 'transition8_1' },
            node8_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你默默持枪站立，陪首长走完最后一段路。', next: 'transition8_1' },
            node8_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你奉命先行，回望高地，内心焦急万分。', next: 'transition8_1' },
            transition8_1: { chapter: '', narrator: '[炮弹袭来]', dialogue: '一枚炮弹向着指挥高地飞速袭来，生死只在一瞬间。', next: 'chapter5_3' },
            chapter5_3: { chapter: '第五章续：刹那生死', narrator: '[抉择9]', dialogue: '你决定：', choices: [
                { text: '[A] 扑上前掩护', next: 'node9_1', spirit: 5 },
                { text: '[B] 大声嘶吼警报', next: 'node9_2', spirit: 2 },
                { text: '[C] 本能躲避', next: 'node9_3', spirit: -4 }
            ], node: 9 },
            node9_1: { chapter: '', narrator: '[抉择结果]', dialogue: '你扑上前试图掩护，冲击波将你震飞，目睹悲剧发生。', next: 'transition9_1' },
            node9_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你大声警报，周边战士及时避险，却无力挽回结局。', next: 'transition9_1' },
            node9_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你本能躲避，眼睁睁看着惨剧发生，巨大遗憾填满心房。', next: 'transition9_1' },
            transition9_1: { chapter: '', narrator: '[将星陨落]', dialogue: '硝烟散去，左权副总参谋长壮烈牺牲，将生命留在太行。', next: 'chapter_end' },
            chapter_end: { chapter: '终章：残雪太行', narrator: '[最终抉择]', dialogue: '主力队伍突围成功，最后的机会就在眼前。', choices: [
                { text: '[A] 带头鼓舞士气冲锋', next: 'node10_1', spirit: 5 },
                { text: '[B] 肃穆送别将军', next: 'node10_2', spirit: 2 },
                { text: '[C] 沉默跟随队伍', next: 'node10_3', spirit: -3 }
            ], node: 10 },
            node10_1: { chapter: '', narrator: '[结局]', dialogue: '"同志们！为了首长！冲啊！"你带头冲锋，战士们高喊着冲向防线。', ending: 'good' },
            node10_2: { chapter: '', narrator: '[结局]', dialogue: '你肃穆低头送别将军，泪水无声滑落，心中满是敬意。', ending: 'neutral' },
            node10_3: { chapter: '', narrator: '[结局]', dialogue: '你沉默跟随队伍，没有呐喊，只有心底无尽的悲凉。', ending: 'bad' }
        };

        let currentScene = 'start';
        let currentBackground = 0;
        let visitedNodes = [];
        let isTyping = false;
        let typingIndex = 0;
        let currentDialogue = '';
        
        // 单维度核心倾向：担当与坚守
        let spirit = 0;  // 精神值，正数为担当，负数为退缩
        
        // 节点权重配置（普通节点权重1，关键节点权重翻倍）
        const nodeWeights = {
            1: 1,    // 雨夜急撤 - 普通
            2: 1.5,  // 口粮分配 - 前期试探
            3: 1.5,  // 救援村民 - 前期试探
            4: 1,    // 盘问探子 - 普通
            5: 1,    // 抢修道路 - 普通
            6: 2,    // 炮火来临 - 关键节点
            7: 2.5,  // 断后抉择 - 核心关键
            8: 3,    // 劝说首长 - 核心关键
            9: 3.5,  // 炮弹突袭 - 核心关键
            10: 4    // 最终突围 - 终极关键
        };
        
        // 选择历史记录
        let choiceHistory = [];

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            currentScene = 'start';
            spirit = 0;
            choiceHistory = [];
            visitedNodes = [];
            updateStatus();
            fadeToBackground(0);
            loadScene();
        }

        function restartGame() {
            document.getElementById('end-screen').style.display = 'none';
            startGame();
        }

        function loadScene() {
            const scene = storyData[currentScene];
            if (!scene) return;

            document.getElementById('choices-container').innerHTML = '';
            document.getElementById('chapter-title').textContent = scene.chapter || '';
            document.getElementById('narrator').textContent = scene.narrator || '';

            if (scene.choices) {
                visitedNodes.push(scene.node);
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                showChoices(scene.choices);
            } else if (scene.ending) {
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                setTimeout(() => showEnding(scene.ending), 2000);
            } else {
                currentDialogue = scene.dialogue;
                typeDialogue();
            }
        }

        function typeDialogue() {
            if (isTyping) return;
            isTyping = true;
            typingIndex = 0;
            document.getElementById('dialogue').innerHTML = '';
            
            const typeInterval = setInterval(() => {
                if (typingIndex < currentDialogue.length) {
                    let char = currentDialogue[typingIndex];
                    if (char === '<') {
                        let tagEnd = currentDialogue.indexOf('>', typingIndex);
                        if (tagEnd !== -1) {
                            document.getElementById('dialogue').innerHTML += currentDialogue.substring(typingIndex, tagEnd + 1);
                            typingIndex = tagEnd + 1;
                            return;
                        }
                    }
                    document.getElementById('dialogue').innerHTML += char;
                    typingIndex++;
                } else {
                    clearInterval(typeInterval);
                    isTyping = false;
                    if (storyData[currentScene].next) {
                        setTimeout(() => {
                            currentScene = storyData[currentScene].next;
                            updateBackground();
                            loadScene();
                        }, 1500);
                    }
                }
            }, 30);
        }

        function skipTyping() {
            if (isTyping) {
                document.getElementById('dialogue').innerHTML = currentDialogue;
                isTyping = false;
                typingIndex = currentDialogue.length;
                if (storyData[currentScene].next) {
                    setTimeout(() => {
                        currentScene = storyData[currentScene].next;
                        updateBackground();
                        loadScene();
                    }, 500);
                }
            }
        }

        function showChoices(choices) {
            const container = document.getElementById('choices-container');
            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = choice.text;
                btn.onclick = () => makeChoice(choice);
                container.appendChild(btn);
            });
        }

        async function makeChoice(choice) {
            const currentNode = visitedNodes.length + 1;
            const influence = choice.spirit || 0;
            
            // 调用后端API计算精神值变化
            try {
                const response = await fetch('/api/calculate-spirit/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        node: currentNode,
                        influence: influence,
                        current_spirit: spirit
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const change = data.change;
                    spirit = data.new_spirit;
                    
                    // 记录选择历史（包含评价）
                    choiceHistory.push({
                        node: currentNode,
                        choice: choice.text,
                        influence: influence,
                        weight: data.weight,
                        change: change,
                        spiritAfter: spirit,
                        evaluation: data.evaluation || ''
                    });
                }
            } catch (error) {
                // 如果API调用失败，使用本地计算作为备用
                const weight = nodeWeights[currentNode] || 1;
                const change = influence * weight;
                spirit += change;
                
                if (currentNode >= 7 && influence > 0) {
                    spirit += 2;
                }
                
                // 生成本地评价
                let evaluation = '';
                if (influence > 0) {
                    evaluation = getLocalEvaluation(currentNode, 'positive');
                } else if (influence < 0) {
                    evaluation = getLocalEvaluation(currentNode, 'negative');
                } else {
                    evaluation = getLocalEvaluation(currentNode, 'neutral');
                }
                
                choiceHistory.push({
                    node: currentNode,
                    choice: choice.text,
                    influence: influence,
                    weight: weight,
                    change: change,
                    spiritAfter: spirit,
                    evaluation: evaluation
                });
            }
            
            currentScene = choice.next;
            updateStatus();
            updateBackground();
            loadScene();
        }
        
        function getLocalEvaluation(node, type) {
            const evaluations = {
                1: {
                    positive: '雨夜之中，你伸出援手。善良的种子，在泥泞中生根发芽。',
                    neutral: '你选择了稳妥之路，既保护了自己，也尽到了职责。',
                    negative: '军令如山，但人心更重。那一刻的催促，或许会成为心中的刺。'
                },
                2: {
                    positive: '半块干粮，一份希望。你把生的机会留给了更需要的人。',
                    neutral: '平分口粮，不偏不倚。乱世之中，这已是难得的公平。',
                    negative: '战争面前，自保无可厚非。只是那份干粮的重量，是否会压在心头？'
                },
                3: {
                    positive: '百姓是根，军队是叶。你用行动诠释了什么是人民子弟兵。',
                    neutral: '服从命令是天职，但百姓的安危，始终牵动着你的心。',
                    negative: '鸣枪引敌，虽属无奈。只是那些未能救下的面孔，是否会时常浮现？'
                },
                4: {
                    positive: '明察秋毫，识破诡计。你的谨慎，守护了整个队伍的安全。',
                    neutral: '将甄别之责交予首长，既尽职守，也显谦逊。',
                    negative: '轻信于人，险些酿成大祸。战争之中，信任需要代价。'
                },
                5: {
                    positive: '加固绳索，排除隐患。你的细致，让战友们安全通过险地。',
                    neutral: '快速通过，虽有惊险，却也体现了军人的决断。',
                    negative: '全面排查，稳妥至上。只是时间，往往是战争中最奢侈的东西。'
                },
                6: {
                    positive: '留下掩护，断后阻击。你选择了危险，把生的希望留给战友。',
                    neutral: '全员突围，共进退。这份凝聚力，是战胜强敌的关键。',
                    negative: '托付农户，虽属无奈。只是那些伤员的命运，是否会让你牵挂？'
                },
                7: {
                    positive: '主动请战，勇担断后。真正的勇士，敢于直面炮火与死亡。',
                    neutral: '居中护卫，坚守职责。首长的安全，就是你的使命。',
                    negative: '申请先行，人之常情。只是回望战场时，心中是否会有波澜？'
                },
                8: {
                    positive: '劝说撤离，情深义重。你用勇气直面首长，用智慧守护英雄。',
                    neutral: '誓死陪伴，同生共死。这份忠诚，感天动地。',
                    negative: '护送他人，职责所在。只是那最后的时刻，你不在他身边。'
                },
                9: {
                    positive: '舍身掩护，英雄本色。你用血肉之躯，诠释了什么是担当。',
                    neutral: '大声警报，提醒战友。你的呼喊，或许能挽救更多生命。',
                    negative: '本能躲避，人之天性。只是那一幕，会成为永远的遗憾。'
                },
                10: {
                    positive: '振臂高呼，冲锋在前。将军的精神，在你身上得到传承。',
                    neutral: '肃穆送别，含泪前行。带着将军的遗志，继续战斗。',
                    negative: '沉默跟随，心如止水。只是那无声的背影，是否承载着太多沉重？'
                }
            };
            return evaluations[node] && evaluations[node][type] ? evaluations[node][type] : '每一个选择，都有它的意义。';
        }
        
        function updateStatus() {
            document.getElementById('node-count').textContent = `${visitedNodes.length}/10`;
            
            // 直接基于精神值判定结局
            const endingType = determineEnding();
            document.getElementById('ending-type').textContent = endingType;

            document.getElementById('progress-fill').style.width = `${(visitedNodes.length / 10) * 100}%`;
        }
        
        function determineEnding() {
            // 链式选择结局判定：
            // - 精神值 >= 15：青山永念（圆满结局）
            // - -5 <= 精神值 < 15：山河怅惘（惋惜结局）
            // - 精神值 < -5：半生愧悔（遗憾结局）
            if (spirit >= 15) {
                return '青山永念';
            } else if (spirit >= -5) {
                return '山河怅惘';
            } else {
                return '半生愧悔';
            }
        }
        
        function updateBackground() {
            const newBackgroundIndex = sceneBackgroundMap[currentScene] !== undefined ? sceneBackgroundMap[currentScene] : currentBackground;
            if (newBackgroundIndex !== currentBackground) {
                currentBackground = newBackgroundIndex;
                fadeToBackground(currentBackground);
            }
        }

        function fadeToBackground(index) {
            const overlay = document.getElementById('fade-overlay');
            const bgElement = document.getElementById('background');
            const errorElement = document.getElementById('bg-error');
            
            overlay.classList.add('fade-in');
            
            setTimeout(() => {
                const img = new Image();
                img.onload = function() {
                    bgElement.style.backgroundImage = `url(${backgrounds[index]})`;
                    errorElement.style.display = 'none';
                    overlay.classList.remove('fade-in');
                };
                img.onerror = function() {
                    errorElement.textContent = `⚠️ 无法加载: ${backgrounds[index]}`;
                    errorElement.style.display = 'block';
                    bgElement.style.background = 'linear-gradient(135deg, #1a1a2e, #16213e)';
                    overlay.classList.remove('fade-in');
                };
                img.src = backgrounds[index];
            }, 400);
        }

        function showEnding(type) {
            const endScreen = document.getElementById('end-screen');
            const background = document.getElementById('background');
            let title = '', content = '';
            let imageIndex = 14;

            // 直接使用本地判定逻辑
            if (type === 'good') {
                title = '结局一：青山永念';
                content = '<p>你带着满身伤痕站在山岭之上，送别了左权将军。回望突围之路，每一次善意与担当都让你收获了真挚情谊。将军的精神万古长青，这段烽火记忆成为你一生最珍贵的念想。</p>';
                imageIndex = 14;
            } else if (type === 'neutral') {
                title = '结局二：山河怅惘';
                content = '<p>你恪守本分，做好了警卫员的职责。经历了战火的残酷与将星陨落的悲壮，心中满是沉甸甸的惋惜与敬意。</p>';
                imageIndex = 15;
            } else {
                title = '结局三：半生愧悔';
                content = '<p>你侥幸存活，可一路走来的退缩与犹豫成了终生的枷锁。每到雨夜，太行山上的身影便会闯入梦境，这份遗憾如影随形。</p>';
                imageIndex = 16;
            }

            background.style.backgroundImage = `url('${backgrounds[imageIndex]}')`;
            const statsPanel = generateStatsPanel();
            
            // 添加结局总评
            const finalComment = getDefaultFinalComment(type);
            
            const finalCommentHtml = `
            <div style="
                background: rgba(196, 30, 58, 0.1);
                border: 1px solid rgba(196, 30, 58, 0.3);
                border-radius: 8px;
                padding: 20px;
                margin-top: 20px;
                text-align: center;
            ">
                <div style="color: #ffd700; font-size: 0.9em; margin-bottom: 10px;">【最终评语】</div>
                <div style="color: #e8e8e8; font-size: 1.1em; line-height: 1.8;">${finalComment}</div>
            </div>
            `;

            document.getElementById('end-title').textContent = title;
            document.getElementById('end-content').innerHTML = content + finalCommentHtml + statsPanel;
            endScreen.style.display = 'flex';
        }
        
        function getDefaultFinalComment(type) {
            if (type === 'good') {
                return '勇者无惧，仁者无敌。你用一次次的选择证明，平凡人也能铸就伟大。青山有幸埋忠骨，将军精神永存！';
            } else if (type === 'neutral') {
                return '恪尽职守，无愧于心。你的选择或许不够耀眼，但每一步都走得踏实。山河依旧，英雄永存心中。';
            } else {
                return '战争残酷，生存不易。只是有些选择，一旦做出，便再也无法回头。愿来生，能有勇气面对每一个抉择。';
            }
        }
        
        function generateStatsPanel() {
            try {
                let positiveChoices = 0;
                let negativeChoices = 0;
                let neutralChoices = 0;
                
                if (choiceHistory && choiceHistory.length > 0) {
                    choiceHistory.forEach(choice => {
                        if (choice && choice.influence > 0) positiveChoices++;
                        else if (choice && choice.influence < 0) negativeChoices++;
                        else neutralChoices++;
                    });
                }
                
                const maxSpirit = 5 * 4 + 4 * 2;
                const minSpirit = -4 * 3.5;
                const normalizedSpirit = Math.min(100, Math.max(0, ((spirit - minSpirit) / (maxSpirit - minSpirit)) * 100));
                
                let panel = `
                <div id="stats-panel" style="
                    background: rgba(26, 26, 46, 0.95);
                    border: 1px solid rgba(196, 30, 58, 0.5);
                    border-radius: 12px;
                    padding: 25px;
                    margin-top: 30px;
                    text-align: left;
                    max-height: 400px;
                    overflow-y: auto;
                ">
                    <h3 style="color: #c41e3a; text-align: center; margin-bottom: 20px; letter-spacing: 2px;">征程统计</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px;">
                            <div style="color: #ffd700; font-size: 0.9em;">最终精神值</div>
                            <div style="font-size: 1.8em; font-weight: bold; color: ${spirit >= 15 ? '#4ade80' : spirit >= -5 ? '#fbbf24' : '#f87171'};">${spirit}</div>
                        </div>
                        <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px;">
                            <div style="color: #ffd700; font-size: 0.9em;">选择总数</div>
                            <div style="font-size: 1.8em; font-weight: bold; color: #e8e8e8;">${choiceHistory ? choiceHistory.length : 0}</div>
                        </div>
                    </div>
                    
                    <div style="height: 20px; background: #2d2d44; border-radius: 10px; margin-bottom: 15px; overflow: hidden;">
                        <div style="
                            height: 100%;
                            width: ${normalizedSpirit}%;
                            background: linear-gradient(90deg, #c41e3a, #ffd700, #4ade80);
                            border-radius: 10px;
                            transition: width 1s ease;
                        "></div>
                    </div>
                    
                    <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                        <div style="text-align: center;">
                            <div style="color: #4ade80; font-size: 1.5em; font-weight: bold;">${positiveChoices}</div>
                            <div style="color: #888; font-size: 0.8em;">担当选择</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #fbbf24; font-size: 1.5em; font-weight: bold;">${neutralChoices}</div>
                            <div style="color: #888; font-size: 0.8em;">中立选择</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #f87171; font-size: 1.5em; font-weight: bold;">${negativeChoices}</div>
                            <div style="color: #888; font-size: 0.8em;">退缩选择</div>
                        </div>
                    </div>
                    
                    <div style="border-top: 1px solid rgba(196, 30, 58, 0.3); padding-top: 15px;">
                        <div style="color: #ffd700; font-size: 0.9em; margin-bottom: 10px;">抉择历程</div>
                        <div style="max-height: 150px; overflow-y: auto;">
                `;
                
                if (choiceHistory && choiceHistory.length > 0) {
                    choiceHistory.forEach((choice, index) => {
                        if (!choice) return;
                        const isPositive = choice.influence > 0;
                        const isNegative = choice.influence < 0;
                        const borderColor = isPositive ? '#4ade80' : isNegative ? '#f87171' : '#fbbf24';
                        const textColor = isPositive ? '#4ade80' : isNegative ? '#f87171' : '#fbbf24';
                        
                        panel += `
                            <div style="
                                padding: 12px; 
                                background: rgba(0,0,0,0.2);
                                margin-bottom: 10px;
                                border-radius: 6px;
                                border-left: 4px solid ${borderColor};
                            ">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                    <span style="color: #c41e3a; font-weight: bold;">节点${choice.node}</span>
                                    <span style="color: ${textColor}; font-weight: bold;">
                                        ${isPositive ? '+' : ''}${choice.change}
                                    </span>
                                </div>
                                <div style="color: #e8e8e8; font-size: 0.9em; margin-bottom: 6px; font-style: italic;">
                                    ${choice.choice}
                                </div>
                                <div style="color: #9ca3af; font-size: 0.85em; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
                                    <span style="color: #ffd700;">【评价】</span> ${choice.evaluation || '每一个选择，都有它的意义。'}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    panel += '<div style="color: #888; text-align: center;">暂无选择记录</div>';
                }
                
                panel += `
                        </div>
                    </div>
                </div>
                `;
                
                return panel;
            } catch (e) {
                console.error('generateStatsPanel error:', e);
                return '<div style="color: #f87171;">统计面板加载失败</div>';
            }
        }

        document.getElementById('text-box').addEventListener('click', skipTyping);
    </script>
