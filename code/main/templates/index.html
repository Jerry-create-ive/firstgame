<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血色太行 - 左权将军</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimHei', 'Microsoft YaHei', sans-serif; overflow: hidden; }
        
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: opacity 0.5s ease;
        }
        
        #fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        
        #fade-overlay.fade-in {
            opacity: 1;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        
        #start-screen h1 {
            font-size: 3rem;
            color: #c41e3a;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        #start-screen p {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        #start-btn {
            padding: 15px 50px;
            font-size: 1.2rem;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #start-btn:hover {
            background: #8b0000;
            transform: scale(1.05);
        }
        
        #game-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: none;
            flex-direction: column;
            z-index: 10;
        }
        
        #chapter-title {
            font-size: 1.5rem;
            color: #c41e3a;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        #narrator {
            font-size: 1.1rem;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        #dialogue-box {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 100px;
        }
        
        #dialogue {
            font-size: 1.2rem;
            color: white;
            line-height: 1.8;
        }
        
        #choices-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .choice-btn {
            padding: 12px 30px;
            font-size: 1rem;
            background: rgba(196, 30, 58, 0.8);
            color: white;
            border: 2px solid #c41e3a;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            max-width: 45%;
        }
        
        .choice-btn:hover {
            background: #c41e3a;
            transform: translateY(-3px);
        }
        
        #status-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 30px;
            z-index: 20;
        }
        
        .status-item {
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
        }
        
        .status-label {
            font-size: 0.8rem;
            color: #aaa;
        }
        
        .status-value {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #333;
            z-index: 30;
        }
        
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a, #ffd700);
            transition: width 0.5s ease;
        }
        
        #end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 60;
        }
        
        #ending-title {
            font-size: 2.5rem;
            color: #c41e3a;
            margin-bottom: 20px;
        }
        
        #ending-text {
            font-size: 1.2rem;
            color: white;
            max-width: 600px;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        #restart-btn {
            padding: 15px 50px;
            font-size: 1.2rem;
            background: #c41e3a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #restart-btn:hover {
            background: #8b0000;
            transform: scale(1.05);
        }
        
        #bg-error {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            display: none;
            z-index: 40;
        }
    </style>
</head>
<body>
    <div id="background"></div>
    <div id="fade-overlay"></div>
    
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>
    
    <div id="status-bar">
        <div class="status-item">
            <div class="status-label">抉择节点</div>
            <div class="status-value" id="node-count">0/10</div>
        </div>
        <div class="status-item">
            <div class="status-label">信念倾向</div>
            <div class="status-value" id="affection">中立</div>
        </div>
        <div class="status-item">
            <div class="status-label">预计结局</div>
            <div class="status-value" id="ending-type">山河怅惘</div>
        </div>
    </div>
    
    <div id="start-screen">
        <h1>血色太行</h1>
        <p>——纪念左权将军</p>
        <button id="start-btn" onclick="startGame()">开始游戏</button>
    </div>
    
    <div id="game-container">
        <div id="chapter-title"></div>
        <div id="narrator"></div>
        <div id="dialogue-box">
            <div id="dialogue" onclick="skipTyping()"></div>
        </div>
        <div id="choices-container"></div>
    </div>
    
    <div id="end-screen">
        <h2 id="ending-title"></h2>
        <p id="ending-text"></p>
        <button id="restart-btn" onclick="restartGame()">重新开始</button>
    </div>
    
    <div id="bg-error"></div>

            node9_2: { chapter: '', narrator: '[抉择结果]', dialogue: '你强忍悲痛继续突围，完成了将军交给的任务。', next: 'transition9_1' },
            node9_3: { chapter: '', narrator: '[抉择结果]', dialogue: '你本能躲避，眼睁睁看着惨剧发生，巨大遗憾填满心房。', next: 'transition9_1' },
            transition9_1: { chapter: '', narrator: '[将星陨落]', dialogue: '硝烟散去，左权副总参谋长壮烈牺牲，将生命留在太行。', next: 'chapter_end' },
            chapter_end: { chapter: '终章：残雪太行', narrator: '[最终抉择]', dialogue: '主力队伍突围成功，最后的机会就在眼前。', choices: [
                { text: '[A] 带头鼓舞士气冲锋', next: 'node10_1', affection: 1 },
                { text: '[B] 肃穆送别将军', next: 'node10_2', affection: 0 },
                { text: '[C] 沉默跟随队伍', next: 'node10_3', affection: -1 }
            ], node: 10 },
            node10_1: { chapter: '', narrator: '[结局]', dialogue: '"同志们！为了首长！冲啊！"你带头冲锋，战士们高喊着冲向防线。', ending: 'good' },
            node10_2: { chapter: '', narrator: '[结局]', dialogue: '你肃穆低头送别将军，泪水无声滑落，心中满是敬意。', ending: 'neutral' },
            node10_3: { chapter: '', narrator: '[结局]', dialogue: '你沉默跟随队伍，没有呐喊，只有心底无尽的悲凉。', ending: 'bad' }
        };

        let currentScene = 'start';
        let currentBackground = 0;
        let affection = 0;
        let visitedNodes = [];
        let isTyping = false;
        let typingIndex = 0;
        let currentDialogue = '';

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            currentScene = 'start';
            affection = 0;
            visitedNodes = [];
            updateStatus();
            fadeToBackground(0);
            loadScene();
        }

        function restartGame() {
            document.getElementById('end-screen').style.display = 'none';
            startGame();
        }

        function loadScene() {
            const scene = storyData[currentScene];
            if (!scene) {
                console.error('场景不存在:', currentScene);
                document.getElementById('dialogue').innerHTML = '<span style="color: red;">错误：场景加载失败</span>';
                return;
            }

            document.getElementById('choices-container').innerHTML = '';

            document.getElementById('chapter-title').textContent = scene.chapter || '';
            document.getElementById('narrator').textContent = scene.narrator || '';

            if (scene.choices) {
                if (!visitedNodes.includes(scene.node)) {
                    visitedNodes.push(scene.node);
                }
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                showChoices(scene.choices);
            } else if (scene.ending) {
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                setTimeout(() => showEnding(scene.ending), 2000);
            } else {
                currentDialogue = scene.dialogue;
                typeDialogue();
            }
        }

        function typeDialogue() {
            if (isTyping) return;
            isTyping = true;
            typingIndex = 0;
            document.getElementById('dialogue').innerHTML = '';

            const typeInterval = setInterval(() => {
                if (typingIndex < currentDialogue.length) {
                    let char = currentDialogue[typingIndex];
                    if (char === '<') {
                        let tagEnd = currentDialogue.indexOf('>', typingIndex);
                        if (tagEnd !== -1) {
                            document.getElementById('dialogue').innerHTML += currentDialogue.substring(typingIndex, tagEnd + 1);
                            typingIndex = tagEnd + 1;
                            return;
                        }
                    }
                    document.getElementById('dialogue').innerHTML += char;
                    typingIndex++;
                } else {
                    clearInterval(typeInterval);
                    isTyping = false;
                    if (storyData[currentScene].next) {
                        setTimeout(() => {
                            currentScene = storyData[currentScene].next;
                            updateBackground();
                            loadScene();
                        }, 1500);
                    }
                }
            }, 30);
        }

        function skipTyping() {
            if (isTyping) {
                document.getElementById('dialogue').innerHTML = currentDialogue;
                isTyping = false;
                typingIndex = currentDialogue.length;
                if (storyData[currentScene].next) {
                    setTimeout(() => {
                        currentScene = storyData[currentScene].next;
                        updateBackground();
                        loadScene();
                    }, 500);
                }
            }
        }

        function showChoices(choices) {
            const container = document.getElementById('choices-container');
            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = choice.text;
                btn.onclick = () => makeChoice(choice);
                container.appendChild(btn);
            });
        }

        function makeChoice(choice) {
            affection += choice.affection;
            currentScene = choice.next;
            updateStatus();
            updateBackground();
            loadScene();
        }

        function updateStatus() {
            document.getElementById('node-count').textContent = `${visitedNodes.length}/10`;

            let affectionText = affection >= 5 ? '高尚' : affection >= 3 ? '正直' : affection >= 1 ? '善良' : affection >= -1 ? '中立' : affection >= -3 ? '自私' : '冷漠';
            document.getElementById('affection').textContent = affectionText;

            let endingType = affection >= 5 ? '青山永念' : affection >= 0 ? '山河怅惘' : '半生愧悔';
            document.getElementById('ending-type').textContent = endingType;

            document.getElementById('progress-fill').style.width = `${(visitedNodes.length / 10) * 100}%`;
        }

        function updateBackground() {
            const newBackgroundIndex = sceneBackgroundMap[currentScene] !== undefined ? sceneBackgroundMap[currentScene] : currentBackground;
            if (newBackgroundIndex !== currentBackground) {
                currentBackground = newBackgroundIndex;
                fadeToBackground(currentBackground);
            }
        }

        function fadeToBackground(index) {
            const overlay = document.getElementById('fade-overlay');
            const bgElement = document.getElementById('background');
            const errorElement = document.getElementById('bg-error');

            overlay.classList.add('fade-in');

            setTimeout(() => {
                const img = new Image();
                const imageUrl = backgrounds[index];

                img.onload = function() {
                    bgElement.style.backgroundImage = `url(${imageUrl})`;
                    errorElement.style.display = 'none';
                    overlay.classList.remove('fade-in');
                };
                img.onerror = function() {
                    bgElement.style.backgroundImage = `linear-gradient(135deg, #1a1a2e, #16213e)`;
                    errorElement.textContent = '警告：无法加载背景图 ' + backgrounds[index];
                    errorElement.style.display = 'block';
                    overlay.classList.remove('fade-in');
                };
                img.src = imageUrl;
            }, 400);
        }

        function showEnding(type) {
            const endScreen = document.getElementById('end-screen');
            const title = document.getElementById('ending-title');
            const text = document.getElementById('ending-text');

            switch(type) {
                case 'good':
                    title.textContent = '青山永念';
                    text.textContent = '你带着战友们冲出了重围，左权将军的精神永远激励着你。多年后，每当你想起那个血色黄昏，心中依然热血沸腾。太行山上的每一寸土地，都铭记着那段不屈的岁月。';
                    break;
                case 'neutral':
                    title.textContent = '山河怅惘';
                    text.textContent = '战争结束了，但那段记忆永远刻在你心中。你时常会想起那个雨夜的行军，想起牺牲的战友，想起将军最后的身影。和平来之不易，你会用余生守护这份安宁。';
                    break;
                case 'bad':
                    title.textContent = '半生愧悔';
                    text.textContent = '你活了下来，但内心的愧疚从未消散。战场上的选择时常在梦中重现，那些未能挽救的生命，成为你永远的遗憾。唯有继续前行，才能告慰英灵。';
                    break;
            }

            endScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
