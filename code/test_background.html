<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背景切换测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SimSun', serif; overflow: hidden; }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.9;
            transition: opacity 1s ease;
        }
        
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        
        .fade-in { opacity: 1 !important; }
        
        #content-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
        }
        
        #text-box {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 30px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(196, 30, 58, 0.5);
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 1.1em;
            line-height: 1.8;
        }
        
        #status-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 1.1em;
        }
        
        #bg-indicator {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.3em;
        }
        
        #next-btn {
            display: block;
            margin: 20px auto;
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        #next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.5);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="background"></div>
        <div id="fade-overlay"></div>
        
        <div id="status-bar">
            当前背景图: <span id="bg-indicator">1/16</span>
        </div>
        
        <div id="content-area">
            <div id="text-box">
                <div id="dialogue">点击下方按钮测试背景切换效果，背景图会按顺序从1切换到16。</div>
            </div>
            <button id="next-btn" onclick="nextScene()">下一个场景 →</button>
        </div>
    </div>

    <script>
        // Mock背景图 - 使用渐变色模拟16张背景
        const backgrounds = [
            'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',    // 深蓝紫
            'linear-gradient(135deg, #2d1f3d 0%, #1a1a2e 50%, #0d1b2a 100%)',    // 深紫黑
            'linear-gradient(135deg, #3d2914 0%, #2a1f0f 50%, #1a1308 100%)',    // 土褐色
            'linear-gradient(135deg, #1a3a2a 0%, #0d2a1a 50%, #061a0d 100%)',    // 深绿色
            'linear-gradient(135deg, #4a2c2c 0%, #2a1818 50%, #1a0f0f 100%)',    // 暗红色
            'linear-gradient(135deg, #2a2a4a 0%, #1a1a3a 50%, #0f0f2a 100%)',    // 深靛蓝
            'linear-gradient(135deg, #1a3a3a 0%, #0d2a2a 50%, #061a1a 100%)',    // 深青色
            'linear-gradient(135deg, #3a2a1a 0%, #2a1f0f 50%, #1a1308 100%)',    // 深棕色
            'linear-gradient(135deg, #4a1a3a 0%, #2a0f1f 50%, #1a0a14 100%)',    // 深玫红
            'linear-gradient(135deg, #1a2a4a 0%, #0d1a3a 50%, #060f2a 100%)',    // 夜空蓝
            'linear-gradient(135deg, #3a3a2a 0%, #2a2a1a 50%, #1a1a0f 100%)',    // 橄榄绿
            'linear-gradient(135deg, #4a3a1a 0%, #2a1f0a 50%, #1a1305 100%)',    // 金黄棕
            'linear-gradient(135deg, #1a4a3a 0%, #0d2a1f 50%, #061a14 100%)',    // 翠绿色
            'linear-gradient(135deg, #2a1a4a 0%, #1a0f2a 50%, #0f0a1a 100%)',    // 紫罗兰
            'linear-gradient(135deg, #3a1a2a 0%, #1f0f1a 50%, #140a10 100%)',    // 酒红色
            'linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 50%, #000000 100%)'     // 纯黑
        ];

        const sceneBackgroundMap = {
            'scene1': 0,  'scene2': 1,  'scene3': 2,  'scene4': 3,
            'scene5': 4,  'scene6': 5,  'scene7': 6,  'scene8': 7,
            'scene9': 8,  'scene10': 9, 'scene11': 10, 'scene12': 11,
            'scene13': 12, 'scene14': 13, 'scene15': 14, 'scene16': 15
        };

        const sceneDialogues = [
            '【场景1】雨夜山林 - 八路军总部机关连夜转移，向着十字岭深山突围',
            '【场景2】泥泞山路 - 冷雨浇透军装，每一步都举步维艰',
            '【场景3】发现岩洞 - 众人相互扶持，寻找临时休整之所',
            '【场景4】岩洞暂歇 - 清点物资，处理伤员伤口',
            '【场景5】百姓遇险 - 山下村落被日军搜查，村民危在旦夕',
            '【场景6】浓雾弥漫 - 山间起雾，视野被大幅遮挡',
            '【场景7】遭遇奸细 - 一名可疑陌生人出现在队伍前方',
            '【场景8】险坡危索 - 防护绳索松动，通行危机四伏',
            '【场景9】炮火来袭 - 日军主力追踪至此，大规模进攻打响',
            '【场景10】伤员安置 - 商议重伤员的安置方案',
            '【场景11】断后任务 - 组织精锐力量组成断后小队',
            '【场景12】生死绝境 - 包围圈彻底合拢，突围通道被封锁',
            '【场景13】将星陨落 - 左权将军拒绝撤离，执意坐镇指挥',
            '【场景14】千钧一发 - 炮弹飞速袭来，生死只在一瞬间',
            '【场景15】硝烟散尽 - 将军壮烈牺牲，悲痛笼罩全军',
            '【场景16】终章突围 - 擦干眼泪，带着遗志继续前行'
        ];

        let currentBackground = 0;
        let currentSceneIndex = 1;

        function nextScene() {
            if (currentSceneIndex > 16) {
                currentSceneIndex = 1;
            }
            
            const sceneName = `scene${currentSceneIndex}`;
            const newBackgroundIndex = sceneBackgroundMap[sceneName];
            
            updateBackground(newBackgroundIndex);
            updateDialogue(currentSceneIndex - 1);
            updateStatus(currentSceneIndex);
            
            currentSceneIndex++;
        }

        function updateBackground(index) {
            if (index !== currentBackground) {
                currentBackground = index;
                fadeToBackground(index);
            }
        }

        function fadeToBackground(index) {
            const overlay = document.getElementById('fade-overlay');
            overlay.classList.add('fade-in');
            
            setTimeout(() => {
                document.getElementById('background').style.background = backgrounds[index];
                overlay.classList.remove('fade-in');
            }, 400);
        }

        function updateDialogue(index) {
            document.getElementById('dialogue').textContent = sceneDialogues[index];
        }

        function updateStatus(sceneNum) {
            document.getElementById('bg-indicator').textContent = `${sceneNum}/16`;
        }

        // 初始化第一个场景
        window.onload = function() {
            document.getElementById('background').style.background = backgrounds[0];
            updateDialogue(0);
            updateStatus(1);
        };
    </script>
</body>
</html>
