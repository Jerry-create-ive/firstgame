<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太行残雪 - 视觉小说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimSun', 'STSong', serif;
            background: #1a1a2e;
            color: #e8e8e8;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.9;
            transition: opacity 1s ease;
        }

        #content-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.8), rgba(0,0,0,0));
            padding: 30px;
            overflow-y: auto;
        }

        #text-box {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 30px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(196, 30, 58, 0.5);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.1);
        }

        #chapter-title {
            color: #c41e3a;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 4px;
        }

        #narrator {
            color: #ffd700;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-style: italic;
        }

        #dialogue {
            font-size: 1.1em;
            line-height: 1.8;
            color: #e8e8e8;
            text-indent: 2em;
            margin-bottom: 20px;
        }

        #choices-container {
            max-width: 800px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border: 1px solid rgba(196, 30, 58, 0.6);
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'SimSun', 'STSong', serif;
        }

        .choice-btn:hover {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border-color: #c41e3a;
            transform: translateX(10px);
            box-shadow: 0 0 20px rgba(196, 30, 58, 0.4);
        }

        #status-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(196, 30, 58, 0.3);
            font-size: 0.9em;
        }

        #status-bar div {
            margin: 5px 0;
            color: #e8e8e8;
        }

        #status-bar .label {
            color: #c41e3a;
            font-weight: bold;
        }

        #progress-bar {
            width: 100%;
            height: 3px;
            background: #2d2d44;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c41e3a, #ffd700);
            transition: width 0.5s ease;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #start-title {
            font-size: 3.5em;
            color: #c41e3a;
            text-shadow: 0 0 30px rgba(196, 30, 58, 0.5);
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        #start-subtitle {
            font-size: 1.2em;
            color: #e8e8e8;
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        #start-btn {
            padding: 15px 50px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'SimSun', 'STSong', serif;
            letter-spacing: 3px;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.6);
        }

        #end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 30px;
        }

        #end-title {
            font-size: 2.5em;
            color: #c41e3a;
            margin-bottom: 30px;
            text-align: center;
        }

        #end-content {
            max-width: 800px;
            font-size: 1.1em;
            line-height: 2;
            color: #e8e8e8;
            text-align: center;
            margin-bottom: 40px;
        }

        #restart-btn {
            padding: 15px 50px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border: 1px solid rgba(196, 30, 58, 0.6);
            border-radius: 6px;
            color: #e8e8e8;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'SimSun', 'STSong', serif;
        }

        #restart-btn:hover {
            background: linear-gradient(135deg, #c41e3a 0%, #8b0000 100%);
            border-color: #c41e3a;
        }

        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .fade-in {
            opacity: 1 !important;
        }

        .center-text {
            text-align: center;
            text-indent: 0 !important;
        }

        .highlight {
            color: #ffd700;
            font-weight: bold;
        }

        .character-name {
            color: #c41e3a;
            font-weight: bold;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(45, 45, 68, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(196, 30, 58, 0.5);
            border-radius: 3px;
        }
    </style>
</head>

    <div id="game-container">
        <div id="background"></div>
        
        <div id="fade-overlay"></div>

        <div id="start-screen">
            <h1 id="start-title">太行残雪</h1>
            <p id="start-subtitle">—— 1942年十字岭反扫荡纪实</p>
            <button id="start-btn" onclick="startGame()">开始游戏</button>

            <div id="text-box">
                <div id="chapter-title"></div>
                <div id="narrator"></div>

            <div id="choices-container"></div>

            <button id="restart-btn" onclick="restartGame()">重新开始</button>

        let currentScene = 'start';
        let affection = 0;
        let visitedNodes = [];
        let isTyping = false;
        let typingIndex = 0;
        let currentDialogue = '';

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            currentScene = 'start';
            affection = 0;
            visitedNodes = [];
            updateStatus();
            fadeToBackground(sceneBackgroundMap['start'] || 0);
            loadScene();
        }

        function restartGame() {
            document.getElementById('end-screen').style.display = 'none';
            startGame();
        }

        function loadScene() {
            const scene = storyData[currentScene];
            if (!scene) return;

            document.getElementById('choices-container').innerHTML = '';

            if (scene.chapter) {
                document.getElementById('chapter-title').textContent = scene.chapter;
            } else {
                document.getElementById('chapter-title').textContent = '';
            }

            if (scene.narrator) {
                document.getElementById('narrator').textContent = scene.narrator;
            } else {
                document.getElementById('narrator').textContent = '';
            }

            if (scene.choices) {
                visitedNodes.push(scene.node);
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                showChoices(scene.choices);
            } else if (scene.ending) {
                document.getElementById('dialogue').innerHTML = scene.dialogue;
                setTimeout(() => showEnding(scene.ending), 2000);
            } else {
                currentDialogue = scene.dialogue;
                typeDialogue();
            }
        }

        function typeDialogue() {
            if (isTyping) return;
            
            isTyping = true;
            typingIndex = 0;
            document.getElementById('dialogue').innerHTML = '';
            
            const typeInterval = setInterval(() => {
                if (typingIndex < currentDialogue.length) {
                    let char = currentDialogue[typingIndex];
                    if (char === '<') {
                        let tagEnd = currentDialogue.indexOf('>', typingIndex);
                        if (tagEnd !== -1) {
                            document.getElementById('dialogue').innerHTML += currentDialogue.substring(typingIndex, tagEnd + 1);
                            typingIndex = tagEnd + 1;
                            return;
                        }
                    }
                    document.getElementById('dialogue').innerHTML += char;
                    typingIndex++;
                } else {
                    clearInterval(typeInterval);
                    isTyping = false;
                    if (storyData[currentScene].next) {
                        setTimeout(() => {
                            currentScene = storyData[currentScene].next;
                            updateBackground();
                            loadScene();
                        }, 1500);
                    }
                }
            }, 30);
        }

        function skipTyping() {
            if (isTyping) {
                document.getElementById('dialogue').innerHTML = currentDialogue;
                isTyping = false;
                typingIndex = currentDialogue.length;
                if (storyData[currentScene].next) {
                    setTimeout(() => {
                        currentScene = storyData[currentScene].next;
                        updateBackground();
                        loadScene();
                    }, 500);
                }
            }
        }

        function showChoices(choices) {
            const container = document.getElementById('choices-container');
            choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `${index + 1}. ${choice.text}`;
                btn.onclick = () => makeChoice(choice);
                container.appendChild(btn);
            });
        }

        function makeChoice(choice) {
            affection += choice.affection;
            currentScene = choice.next;
            updateStatus();
            updateBackground();
            loadScene();
        }

        function updateStatus() {
            const nodeCount = visitedNodes.length;
            document.getElementById('node-count').textContent = `${nodeCount}/10`;
            
            let affectionText = '中立';
            if (affection >= 5) affectionText = '高尚';
            else if (affection >= 3) affectionText = '正直';
            else if (affection >= 1) affectionText = '善良';
            else if (affection >= -1) affectionText = '中立';
            else if (affection >= -3) affectionText = '自私';
            else affectionText = '冷漠';
            document.getElementById('affection').textContent = affectionText;

            let endingType = '未定';
            if (affection >= 5) endingType = '青山永念';
            else if (affection >= 0) endingType = '山河怅惘';
            else endingType = '半生愧悔';
            document.getElementById('ending-type').textContent = endingType;

            const progress = (visitedNodes.length / 10) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function updateBackground() {
            const newBackgroundIndex = sceneBackgroundMap[currentScene] !== undefined ? sceneBackgroundMap[currentScene] : currentBackground;
            if (newBackgroundIndex !== currentBackground) {
                currentBackground = newBackgroundIndex;
                fadeToBackground(currentBackground);
            }
        }

        function fadeToBackground(index) {
            const overlay = document.getElementById('fade-overlay');
            overlay.classList.add('fade-in');
            
            setTimeout(() => {
                document.getElementById('background').style.backgroundImage = `url(${backgrounds[index]})`;
                overlay.classList.remove('fade-in');
            }, 400);
        }

        function showEnding(type) {
            const endScreen = document.getElementById('end-screen');
            let title = '';
            let content = '';

            if (type === 'good') {
                title = '结局一：青山永念，忠骨留芳';
                content = '<p>风雪渐渐停歇，炮火声彻底消失在太行群山之间。十字岭重归寂静，唯有山间松柏迎风挺立。</p><p>你带着满身伤痕站在山岭之上，送别了一路庇护战士、心系苍生的左权将军。回望整段突围之路：雨夜搀扶战友、岩洞分粮救伤员、冒险救助百姓、险路挺身而出、断后直面炮火……每一次善意与担当，都让你收获了真挚的战友情、百姓的感恩、首长的信任。</p><p>将军温和的笑容、叮嘱的话语、危难时挺身而出的模样，深深镌刻在你的脑海中。他身居高位，却从未脱离士兵，始终把每一个普通人的性命扛在肩头。</p><p>突围成功后，你带着将军未竟的理想继续征战四方，守护这片他用生命捍卫的山河。往后余生，每当望向巍峨的太行山，泪水总会无声滑落。英雄长眠于此，精神万古长青，这段生死与共的烽火记忆，成为你一生最滚烫、最珍贵的念想。</p>';
            } else if (type === 'neutral') {
                title = '结局二：山河怅惘，心怀惋惜';
                content = '<p>反扫荡战役结束，大部队顺利突围，根据地保住了有生力量，可左权将军却永远留在了十字岭。</p><p>一路走来，你恪守本分，做好一名警卫员该做的所有事，不主动为善，也从未自私退缩。你亲眼见证了战火的残酷、军民的同心，也目睹了将星陨落的悲壮。</p><p>你和将军之间有上下级的敬重，却没有深入骨髓的羁绊；和战友之间有并肩作战的情谊，却没有生死相托的默契。</p><p>岁月流转，你安稳走过往后的日子。闲暇之时，总会想起太行山上那个沉稳宽厚的身影，心中满是沉甸甸的惋惜与敬意。你铭记先烈的牺牲，珍惜来之不易的和平，带着这份缅怀，平静而坚定地走完一生。</p>';
            } else {
                title = '结局三：半生愧悔，夜夜难眠';
                content = '<p>你侥幸从惨烈的突围中活了下来，可一路走来一次次退缩、犹豫、只顾自保的画面，成了终生无法挣脱的枷锁。</p><p>当初看到受伤的新兵，你选择冷眼催促；面对濒死的伤员，你私藏口粮；百姓身陷险境，你视而不见；危险来临之际，你屡屡推脱责任、保全自身。到了最后生死关头，你也没能鼓起勇气，守护那位一直善待你的首长。</p><p>历史从未因个人选择改变分毫：将军殉国，队伍突围，革命走向胜利。唯独你，被无尽的愧疚困住。</p><p>战友们谈起左权将军的仁厚与壮烈时，你只能低头沉默、刻意躲闪。每到雨夜风起，太行山上的炮火、硝烟与身影，便会闯入梦境。日复一日，年复一年，这份遗憾与悔恨如影随形，让你夜夜难安，直至人生尽头。</p>';
            }

            document.getElementById('end-title').textContent = title;
            document.getElementById('end-content').innerHTML = content;
            endScreen.style.display = 'flex';
        }

        document.getElementById('text-box').addEventListener('click', skipTyping);
    </script>
